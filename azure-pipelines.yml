trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.11'
  nodeVersion: '20.x'
  # Set these in Azure DevOps Pipeline Variables (or replace inline):
  azureSubscription: 'YOUR_SERVICE_CONNECTION_NAME'
  appServiceName: 'YOUR_APP_SERVICE_NAME'

stages:
  - stage: Build
    displayName: 'Build & Package'
    jobs:
      - job: BuildJob
        displayName: 'Build Application'
        steps:
          # --- Python setup ---
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install fastapi uvicorn
            displayName: 'Install Python dependencies'

          # --- Node setup & build frontend ---
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Use Node.js $(nodeVersion)'

          - script: |
              cd ui
              npm install
              npm run build
            displayName: 'Build React frontend'

          # --- Package everything ---
          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/pmtracker.zip'
              replaceExistingArchive: true
            displayName: 'Zip deployment package'

          - publish: '$(Build.ArtifactStagingDirectory)/pmtracker.zip'
            artifact: 'drop'
            displayName: 'Publish artifact'

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webAppLinux'
                    appName: '$(appServiceName)'
                    package: '$(Pipeline.Workspace)/drop/pmtracker.zip'
                    runtimeStack: 'PYTHON|3.11'
                    startUpCommand: 'uvicorn api.main:app --host 0.0.0.0 --port 8000'
                  displayName: 'Deploy to Azure App Service'
